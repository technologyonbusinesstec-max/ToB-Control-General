<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso · ToB Operations</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body>

  <!-- Decorative grid -->
  <div class="bg-grid" aria-hidden="true"></div>

  <!-- Ambient light glow -->
  <div class="ambient-glow" aria-hidden="true"></div>

  <main class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <div class="logo-badge">ToB</div>
        <h1 class="login-title">Operations Center</h1>
        <p class="login-subtitle">Ingresa tus credenciales para acceder al sistema de coordinación.</p>
      </div>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Correo Electrónico</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="tu@correo.com" required autocomplete="email" autofocus />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <div class="login-error" id="login-error" role="alert" style="display: none;"></div>

        <button type="submit" class="btn-submit" id="btn-login">
          <span class="loading-spinner" id="login-spinner" style="display:none; width:14px; height:14px; border-width:2px; margin-right:8px;"></span>
          <span>Iniciar Sesión</span>
        </button>
      </form>
    </div>
    
    <div class="login-footer">
      Acceso exclusivo para coordinadores oficiales del ToB 2026.
    </div>
  </main>

  <!-- Scripts -->
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login.js"></script>

</body>
</html>
