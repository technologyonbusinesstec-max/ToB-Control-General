<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Módulo de control y reporte de gastos del equipo ToB 2026." />
  <title>ToB · Control de Gastos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/modules-shared.css" />
  <link rel="stylesheet" href="assets/css/gastos.css" />
</head>
<body>

  <!-- KPI Bar -->
  <header class="kpi-bar">
    <div class="kpi-bar__logo">
      <a href="index.html" class="logo-badge" style="text-decoration:none;color:#fff;">ToB</a>
      <span>Operations</span>
    </div>
    <div class="kpi-bar__indicators">
      <div class="kpi-item"><span class="kpi-item__icon">💸</span><div class="kpi-item__info"><span class="kpi-item__label">Gastos Totales</span><span class="kpi-item__value red" id="kpi-gastos">₡0</span></div></div>
      <div class="kpi-item"><span class="kpi-item__icon">💰</span><div class="kpi-item__info"><span class="kpi-item__label">Disponible</span><span class="kpi-item__value green" id="kpi-disponible">₡0</span></div></div>
      <div class="kpi-item"><span class="kpi-item__icon">🤝</span><div class="kpi-item__info"><span class="kpi-item__label">Patrocinadores</span><span class="kpi-item__value blue" id="kpi-contactados">0 / 0</span></div></div>
      <div class="kpi-item kpi-countdown"><span class="kpi-item__icon">⏳</span><div class="kpi-item__info"><span class="kpi-item__label">Para el Evento</span><span class="kpi-item__value gold" id="kpi-dias">— días</span></div></div>
    </div>
  </header>

  <!-- Module Topbar -->
  <nav class="module-topbar">
    <a href="index.html" class="btn-back">← Menú</a>
    <span class="module-topbar__title">💸 Control de Gastos</span>
    <div class="module-topbar__actions">
      <a
        href="https://docs.google.com/forms/d/e/1FAIpQLSfQ4gYGn_HsmN0SnoMRt_ggvt3jJclb7EDiclKOSc_JXEj41Q/viewform?usp=header"
        target="_blank"
        rel="noopener"
        class="btn-external primary"
      >
        ↗ Abrir en nueva pestaña
      </a>
    </div>
  </nav>

  <!-- Iframe: Google Form -->
  <main class="iframe-wrapper">
    <div class="gastos-banner">
      <span class="gastos-banner__icon">💸</span>
      <div>
        <strong>Reportar un Gasto</strong>
        <span>Completá el formulario para registrar un gasto del equipo ToB.</span>
      </div>
    </div>

    <iframe
      id="gastos-iframe"
      class="module-iframe"
      src="https://docs.google.com/forms/d/e/1FAIpQLSfQ4gYGn_HsmN0SnoMRt_ggvt3jJclb7EDiclKOSc_JXEj41Q/viewform?embedded=true&usp=header"
      allowfullscreen
      title="Formulario de Reporte de Gastos"
      loading="lazy"
    >
      <!-- Fallback for no-iframe browsers -->
      <p style="padding:20px;color:var(--text-secondary);">
        Tu navegador no soporta iframes.
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSfQ4gYGn_HsmN0SnoMRt_ggvt3jJclb7EDiclKOSc_JXEj41Q/viewform?usp=header" target="_blank">Abrí el formulario aquí.</a>
      </p>
    </iframe>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-config.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/global.js"></script>
  <script src="assets/js/gastos.js"></script>
</body>
</html>
